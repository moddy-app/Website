<script>
(function() {
  var path = window.location.pathname;
  fetch('https://api.moddy.app/redirects/lookup?domain=moddy.app&path=' + encodeURIComponent(path))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && typeof data.path === 'string' && data.path) {
        window.location.replace(data.path);
      }
    })
    .catch(function() {});
})();
</script>

<style>
  .error-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    padding: 24px;
  }

  .error-code {
    font-size: 96px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -3px;
    color: var(--md-sys-color-primary);
    -webkit-font-smoothing: antialiased;
  }

  .error-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--md-sys-color-on-surface);
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  .error-desc {
    font-size: 15px;
    color: var(--md-sys-color-on-surface-variant);
    margin: 0 0 8px;
    line-height: 1.5;
  }

  @media (max-width: 480px) {
    .error-code {
      font-size: 64px;
      letter-spacing: -2px;
    }

      font-size: 20px;
    }
  }
</style>

<lit-island on:visible import="/js/hydration-entrypoints/form-controls.js">

  </div>
</lit-island>
